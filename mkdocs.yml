site_name: EOPF xcube data store
repo_url: https://github.com/EOPF-Sample-Service/xcube-eopf
repo_name: EOPF-Sample-Service/xcube-eopf

copyright: Copyright &copy; 2025 EOPF Sample Service Team

nav:
  - Overview: index.md
  - Getting Started: start.md
  - User Guide: guide.md
  - Example Notebooks:
      - Introduction: examples/introduction.ipynb
      - Sentinel-2: examples/sentinel_2.ipynb
      - Sentinel-3: examples/sentinel_3.ipynb
  - Python API: api.md
  - About: about.md

theme:
  name: material
  # logo: assets/logo.png
  # favicon: assets/logo-small.png
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: blue grey
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: blue grey
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/EOPF-Sample-Service/xcube-eopf
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/xcube-eopf/

extra_css:
  - stylesheets/xarray_dataset.css

plugins:
  - search
  - mkdocs-jupyter
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_toc_entry: true
            show_root_heading: true
            show_source: true
            heading_level: 2
            annotations_path: brief
            members_order: source
